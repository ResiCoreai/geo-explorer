name: publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: [self-hosted, resicore]
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RUNNER_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com/
          scope: "@resicoreai"

      # Build with scripts disabled for all deps to avoid supply-chain risk
      - name: Install and build
        run: |
          npm install --ignore-scripts
          npm run build

      # Commit the built dist/ back to the branch so consumers can install
      # with --ignore-scripts and still get a working package.
      - name: Commit dist/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if git diff --cached --quiet; then
            echo "dist/ unchanged, nothing to commit"
          else
            git commit -m "build: update compiled dist/"
            git push
          fi

      # Publish to GitHub Packages on tag pushes only
      - name: Update package scope and version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@resicoreai/geo-explorer';
            pkg.version = '1.0.0';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com/' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish --registry=https://npm.pkg.github.com/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
